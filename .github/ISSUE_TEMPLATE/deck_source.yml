name: Deck-source improvement
description: Suggest or report an issue with AI-importable presentation Markdown.
title: "Deck source: "
labels: ["deck-source"]
body:
  - type: input
    id: file
    attributes:
      label: Deck-source file
      description: Path under public/deck-sources, if one exists.
  - type: textarea
    id: issue
    attributes:
      label: What needs to change?
      description: Explain slide-structure, tone, audience, evidence, or import issues.
    validations:
      required: true
  - type: dropdown
    id: tool
    attributes:
      label: Tool tested
      options:
        - Not tested in a presentation tool
        - Gamma
        - Beautiful.ai
        - ChatGPT
        - Claude
        - PowerPoint or Copilot
        - Other
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Include screenshots or import behavior if relevant.
