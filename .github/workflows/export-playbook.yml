name: Export playbook (PDF + DOCX)

# Builds a single combined playbook (PDF and DOCX) from the markdown sources
# and attaches both to the GitHub Release. Runs on release tags only — local
# contributors do not need pandoc installed.

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pandoc and TeX
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex texlive-fonts-recommended

      - uses: actions/setup-node@v4
        with:
          node-version: 22.12
          cache: npm

      - run: npm ci

      - name: Build print-safe markdown source
        run: npm run check:export

      - name: Build PDF
        run: |
          pandoc exports/playbook.md \
            --pdf-engine=xelatex \
            --toc --toc-depth=3 \
            --metadata title='AI Quickstart Guide' \
            --metadata date="$(date +%Y-%m-%d)" \
            -o exports/ai-quickstart-guide.pdf

      - name: Build DOCX
        run: |
          pandoc exports/playbook.md \
            --toc --toc-depth=3 \
            --metadata title='AI Quickstart Guide' \
            -o exports/ai-quickstart-guide.docx

      - name: Build offline pack
        run: |
          zip -j exports/ai-quickstart-offline-pack.zip \
            exports/playbook.md \
            exports/ai-quickstart-guide.pdf \
            exports/ai-quickstart-guide.docx

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            exports/ai-quickstart-guide.pdf
            exports/ai-quickstart-guide.docx
            exports/ai-quickstart-offline-pack.zip

      - name: Upload as workflow artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: playbook
          path: |
            exports/ai-quickstart-guide.*
            exports/ai-quickstart-offline-pack.zip
