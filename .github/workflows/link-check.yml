name: Link check

on:
  pull_request:
    paths:
      - 'src/content/**'
      - 'public/**'
      - 'scripts/**'
      - '*.md'
      - 'LICENSE*'
      - '.github/dependabot.yml'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - 'package*.json'
  schedule:
    # Weekly external link rot check
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22.12
          cache: npm

      - run: npm ci

      - name: Check internal links
        run: npm run lint:links

      - uses: lycheeverse/lychee-action@v2
        with:
          args: --verbose --no-progress --max-concurrency 4 './src/content/**/*.md' './src/content/**/*.mdx' './public/deck-sources/**/*.md' './*.md' './.github/ISSUE_TEMPLATE/*.yml' './.github/PULL_REQUEST_TEMPLATE.md'
          fail: true
