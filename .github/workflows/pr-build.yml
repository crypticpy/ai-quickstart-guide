name: PR build

on:
  pull_request:
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'astro.config.mjs'
      - 'package*.json'
      - 'tsconfig.json'
      - '.github/workflows/**'
      - 'README.md'
      - 'CONTRIBUTING.md'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.12
          cache: npm

      - run: npm ci
      - run: npm run check
      - run: npm run build
      - run: npm run lint:links
