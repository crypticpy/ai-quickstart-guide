name: PR build

on:
  pull_request:
    paths:
      - 'src/**'
      - 'public/**'
      - 'code-samples/**'
      - 'scripts/**'
      - 'astro.config.mjs'
      - 'package*.json'
      - 'tsconfig.json'
      - '.github/workflows/**'
      - '.github/dependabot.yml'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - '*.md'
      - 'LICENSE*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22.12
          cache: npm

      - run: npm ci
      - run: npm run check
      - run: npm run check:deck-sources
      - run: npm run check:export
      - run: npm run build
      - run: npm run lint:links
