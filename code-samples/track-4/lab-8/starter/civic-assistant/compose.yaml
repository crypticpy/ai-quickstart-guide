services:
  civic-assistant:
    build: .
    image: civic-assistant:dev
    ports:
      - "8000:8000"
    environment:
      # Sourced from the host shell. NEVER hardcode the key here.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?set ANTHROPIC_API_KEY in your shell}
      LLM_PROVIDER: ${LLM_PROVIDER:-anthropic}
      LLM_MODEL: ${LLM_MODEL:-provider-model-slug}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      FEATURE_FLAGS: ${FEATURE_FLAGS:-triage_enabled,answer_enabled,classify_enabled}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
